name: Sc
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Sc:
    type: application
    platform: macOS
    sources:
      - path: Sc
    dependencies:
      - sdk: Carbon.framework
      - sdk: ApplicationServices.framework
    settings:
      base:
        PRODUCT_NAME: Sc
        PRODUCT_BUNDLE_IDENTIFIER: com.luccazh.sc
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Sc
        INFOPLIST_KEY_LSMinimumSystemVersion: "15.0"
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
  ScTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScTests
    dependencies:
      - target: Sc
    settings:
      base:
        PRODUCT_NAME: ScTests
        PRODUCT_BUNDLE_IDENTIFIER: com.luccazh.sc.tests
        GENERATE_INFOPLIST_FILE: YES
